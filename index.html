
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Color Catch Deluxe</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#4facfe">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

    body{
        overflow:hidden;
        font-family:Arial, sans-serif;
        background:linear-gradient(135deg,#4facfe,#00f2fe);
        touch-action:none;
    }
    canvas{display:block;}
    #ui{
        position:absolute;
        top:10px;
        width:100%;
        text-align:center;
        color:white;
        font-size:22px;
        font-weight:bold;
        text-shadow:2px 2px 4px rgba(0,0,0,.5);
        z-index:10;
    }
    #topRight{
        position:absolute;
        top:10px;
        right:10px;
        color:white;
        font-size:18px;
        text-shadow:2px 2px 4px rgba(0,0,0,.5);
        z-index:10;
    }
    #gameOver{
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
        background:rgba(0,0,0,.7);
        color:white;
        padding:25px;
        border-radius:16px;
        text-align:center;
        display:none;
        z-index:20;
        min-width:280px;
    }
    #gameOver h2{margin-bottom:10px;}
    #gameOver button{
        margin-top:12px;
        padding:10px 18px;
        border:none;
        border-radius:10px;
        background:#00f2fe;
        color:#000;
        font-size:18px;
        cursor:pointer;
    }
    #notif{
        position:absolute;
        top:80px;
        left:50%;
        transform:translateX(-50%);
        color:white;
        background:rgba(0,0,0,.4);
        padding:10px 14px;
        border-radius:10px;
        display:none;
        z-index:30;
        font-weight:bold;
    }
</style>
</head>
<body>
<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js")
            .then(reg => console.log("Service Worker Registered", reg))
            .catch(err => console.log("Service Worker Error", err));
    });
}
</script>
<div id="ui">
    Score: <span id="score">0</span> |
    Combo: <span id="combo">1x</span> |
    Lives: <span id="lives">3</span>
</div>

<div id="topRight">
    High Score: <span id="highScore">0</span>
</div>

<div id="notif"></div>

<div id="gameOver">
    <h2>Game Over</h2>
    <p>Your Score: <span id="finalScore"></span></p>
    <p>High Score: <span id="finalHighScore"></span></p>
    <button onclick="restartGame()">Play Again</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let score = 0;
let lives = 3;
let combo = 1;
let comboStreak = 0;
let speed = 4;
let shield = false;
let magnet = false;
let slowMotion = false;

let highScore = parseInt(localStorage.getItem("highScore")) || 0;
document.getElementById("highScore").innerText = highScore;

const basketSkins = ["#2f3542","#ff6b81","#ffa502","#2ed573","#1e90ff"];
let unlockedSkins = JSON.parse(localStorage.getItem("skins")) || [0];
let currentSkin = parseInt(localStorage.getItem("currentSkin")) || 0;

const basket = {
    width: 120,
    height: 22,
    x: canvas.width/2 - 60,
    y: canvas.height - 80
};

const colors = [
    "#ff4757","#ffa502","#2ed573",
    "#1e90ff","#e84393","#feca57","#48dbfb"
];

let balls = [];
let particles = [];
let powerUps = [];

function showNotif(text){
    const n = document.getElementById("notif");
    n.innerText = text;
    n.style.display = "block";
    clearTimeout(showNotif._t);
    showNotif._t = setTimeout(()=> n.style.display = "none", 1800);
}

function checkDailyReward(){
    const today = new Date().toDateString();
    const last = localStorage.getItem("lastReward");
    if(last !== today){
        localStorage.setItem("lastReward", today);
        score += 50;
        document.getElementById("score").innerText = score;
        showNotif("Daily Reward +50");
    }
}
checkDailyReward();

function playBeep(freq, duration){
    try{
        const ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctxAudio.createOscillator();
        const gain = ctxAudio.createGain();
        osc.connect(gain);
        gain.connect(ctxAudio.destination);
        osc.frequency.value = freq;
        osc.type = "sine";
        gain.gain.setValueAtTime(0.08, ctxAudio.currentTime);
        osc.start();
        osc.stop(ctxAudio.currentTime + duration);
    }catch(e){}
}

function spawnBall(){
    balls.push({
        x: Math.random()*(canvas.width-40)+20,
        y: -20,
        radius: 20,
        color: colors[Math.floor(Math.random()*colors.length)]
    });
}
setInterval(spawnBall, 700);

function spawnPowerUp(){
    const types = ["shield","magnet","slow"];
    powerUps.push({
        x: Math.random()*(canvas.width-30)+15,
        y: -20,
        radius: 15,
        type: types[Math.floor(Math.random()*types.length)]
    });
}
setInterval(spawnPowerUp, 7000);

function drawBasket(){
    ctx.fillStyle = basketSkins[currentSkin];
    ctx.fillRect(basket.x, basket.y, basket.width, basket.height);

    if(shield){
        ctx.strokeStyle = "#00ffea";
        ctx.lineWidth = 3;
        ctx.strokeRect(basket.x-4, basket.y-4, basket.width+8, basket.height+8);
    }
}

function drawBalls(){
    balls.forEach(ball=>{
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
        ctx.fillStyle = ball.color;
        ctx.fill();
    });
}

function drawPowerUps(){
    powerUps.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
        ctx.fillStyle = p.type==="shield" ? "#00ffea" : p.type==="magnet" ? "#ff00ff" : "#ffffff";
        ctx.fill();
    });
}

function createParticles(x,y,color){
    for(let i=0;i<10;i++){
        particles.push({
            x,y,
            dx:(Math.random()-0.5)*4,
            dy:(Math.random()-0.5)*4,
            size:Math.random()*4+2,
            color,
            life:30
        });
    }
}

function drawParticles(){
    particles.forEach((p,i)=>{
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x,p.y,p.size,p.size);
        p.x += p.dx;
        p.y += p.dy;
        p.life--;
        if(p.life<=0) particles.splice(i,1);
    });
}

function updateBalls(){
    for(let i=balls.length-1;i>=0;i--){
        const ball = balls[i];
        const fallSpeed = slowMotion ? speed/2 : speed;
        ball.y += fallSpeed;

        if(magnet){
            const center = basket.x + basket.width/2;
            if(Math.abs(ball.x-center) < 140 && ball.y > basket.y-180){
                ball.x += (center - ball.x) * 0.08;
            }
        }

        if(ball.y + ball.radius >= basket.y &&
           ball.x > basket.x &&
           ball.x < basket.x + basket.width){

            balls.splice(i,1);
            comboStreak++;
            combo = Math.min(5, 1 + Math.floor(comboStreak/5));

            const gained = combo;
            score += gained;

            createParticles(ball.x, ball.y, ball.color);
            playBeep(600, 0.08);

            if(score % 20 === 0) speed += 0.5;

            document.getElementById("score").innerText = score;
            document.getElementById("combo").innerText = combo + "x";

            if(score > highScore){
                highScore = score;
                localStorage.setItem("highScore", highScore);
                document.getElementById("highScore").innerText = highScore;
            }

            if(score % 50 === 0){
                const skinIndex = Math.min(basketSkins.length-1, unlockedSkins.length);
                if(!unlockedSkins.includes(skinIndex)){
                    unlockedSkins.push(skinIndex);
                    localStorage.setItem("skins", JSON.stringify(unlockedSkins));
                    currentSkin = skinIndex;
                    localStorage.setItem("currentSkin", currentSkin);
                    showNotif("New Basket Skin Unlocked!");
                }
            }
        }

        else if(ball.y > canvas.height){
            balls.splice(i,1);

            if(shield){
                shield = false;
                showNotif("Shield Used!");
            }else{
                lives--;
                comboStreak = 0;
                combo = 1;
                playBeep(220, 0.12);
            }

            document.getElementById("lives").innerText = lives;
            document.getElementById("combo").innerText = combo + "x";

            if(lives<=0) endGame();
        }
    }
}

function updatePowerUps(){
    for(let i=powerUps.length-1;i>=0;i--){
        const p = powerUps[i];
        p.y += 3;

        if(p.y + p.radius >= basket.y &&
           p.x > basket.x &&
           p.x < basket.x + basket.width){

            powerUps.splice(i,1);

            if(p.type==="shield"){
                shield = true;
                showNotif("Shield Activated");
            }
            if(p.type==="magnet"){
                magnet = true;
                showNotif("Magnet Activated");
                setTimeout(()=> magnet=false, 5000);
            }
            if(p.type==="slow"){
                slowMotion = true;
                showNotif("Slow Motion Activated");
                setTimeout(()=> slowMotion=false, 5000);
            }
        }
        else if(p.y > canvas.height){
            powerUps.splice(i,1);
        }
    }
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawBasket();
    drawBalls();
    drawPowerUps();
    drawParticles();

    updateBalls();
    updatePowerUps();

    requestAnimationFrame(draw);
}

function endGame(){
    document.getElementById("finalScore").innerText = score;
    document.getElementById("finalHighScore").innerText = highScore;
    document.getElementById("gameOver").style.display = "block";
}

function restartGame(){
    location.reload();
}

function moveBasket(clientX){
    basket.x = clientX - basket.width/2;
    if(basket.x < 0) basket.x = 0;
    if(basket.x + basket.width > canvas.width){
        basket.x = canvas.width - basket.width;
    }
}

canvas.addEventListener("mousemove", e => moveBasket(e.clientX));
canvas.addEventListener("touchmove", e => {
    moveBasket(e.touches[0].clientX);
}, {passive:true});

draw();
</script>
</body>
</html>
